<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Gallery</title>
    <style>
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #2c3e50;
        }

        
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: #fff;
            border: 2px solid #3498db;
            color: #3498db;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: #3498db;
            color: #fff;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            aspect-ratio: 4 / 3;
            background-color: #e0e0e0;
            display: block;
        }

        
        .gallery-item.hide {
            display: none;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        
        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay span {
            color: white;
            font-size: 1.2rem;
            font-weight: 500;
            border: 2px solid white;
            padding: 5px 15px;
            border-radius: 4px;
        }

        
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 1000;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 85%;
            max-height: 80vh;
            border-radius: 4px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.4s ease;
        }

        .lightbox.active .lightbox-content {
            transform: scale(1);
        }

        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #e74c3c;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            font-size: 30px;
            padding: 15px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
            user-select: none;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        @media (max-width: 600px) {
            .nav-btn {
                padding: 10px 15px;
                font-size: 20px;
            }
            .prev-btn { left: 10px; }
            .next-btn { right: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Image Gallery</h1>

    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="nature">Nature</button>
        <button class="filter-btn" data-filter="architecture">Architecture</button>
        <button class="filter-btn" data-filter="travel">Travel</button>
    </div>

    <div class="gallery-grid" id="gallery">
        <div class="gallery-item" data-category="nature">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="Valley Mountain">
            <div class="overlay"><span>View Image</span></div>
        </div>
        
        <div class="gallery-item" data-category="architecture">
            <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=800&q=80" alt="Modern Skyscraper">
            <div class="overlay"><span>View Image</span></div>
        </div>
        
        <div class="gallery-item" data-category="travel">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80" alt="Sunny Tropical Beach">
            <div class="overlay"><span>View Image</span></div>
        </div>
        
        <div class="gallery-item" data-category="nature">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80" alt="Foggy Forest">
            <div class="overlay"><span>View Image</span></div>
        </div>
        
        <div class="gallery-item" data-category="architecture">
            <img src="https://images.unsplash.com/photo-1449034446853-66c86144b0ad?auto=format&fit=crop&w=800&q=80" alt="Golden Gate Bridge">
            <div class="overlay"><span>View Image</span></div>
        </div>
        
        <div class="gallery-item" data-category="travel">
            <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=800&q=80" alt="Paris Streets and Eiffel Tower">
            <div class="overlay"><span>View Image</span></div>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <span class="close-btn" id="closeBtn">&times;</span>
    <button class="nav-btn prev-btn" id="prevBtn">&#10094;</button>
    <img src="" alt="Enlarged View" class="lightbox-content" id="lightboxImg">
    <button class="nav-btn next-btn" id="nextBtn">&#10095;</button>
</div>

<script>
    
    const galleryItems = document.querySelectorAll('.gallery-item');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeBtn = document.getElementById('closeBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let currentIndex = 0;
    let visibleItems = [...galleryItems]; 

   
    function openLightbox(index) {
        currentIndex = index;
        const imgSrc = visibleItems[currentIndex].querySelector('img').src;
        lightboxImg.src = imgSrc;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden'; // Lock scrolling
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    function showNext() {
        currentIndex = (currentIndex + 1) % visibleItems.length;
        lightboxImg.src = visibleItems[currentIndex].querySelector('img').src;
    }

    function showPrev() {
        currentIndex = (currentIndex - 1 + visibleItems.length) % visibleItems.length;
        lightboxImg.src = visibleItems[currentIndex].querySelector('img').src;
    }

    
    galleryItems.forEach((item) => {
        item.addEventListener('click', () => {
            const index = visibleItems.indexOf(item);
            if (index !== -1) openLightbox(index);
        });
    });

    closeBtn.addEventListener('click', closeLightbox);
    nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });
    prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
    
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowRight") showNext();
        if (e.key === "ArrowLeft") showPrev();
    });

   
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelector('.filter-btn.active').classList.remove('active');
            btn.classList.add('active');

            const filterValue = btn.getAttribute('data-filter');

            galleryItems.forEach(item => {
                if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                    item.classList.remove('hide');
                } else {
                    item.classList.add('hide');
                }
            });

            
            visibleItems = [...galleryItems].filter(item => !item.classList.contains('hide'));
        });
    });
</script>

</body>
</html>
